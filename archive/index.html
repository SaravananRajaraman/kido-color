<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Kido Color - A fun coloring and drawing app for kids aged 3-6!" />
  <title>🎨 Kido Color – Learn &amp; Draw!</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       APP HEADER / NAV
  ═══════════════════════════════════════════ -->
  <header class="app-header" role="banner">
    <button class="logo-btn" id="homeBtn" aria-label="Go to home">
      <span class="logo-emoji" aria-hidden="true">🎨</span>
      <span class="logo-text">Kido Color</span>
    </button>
    <nav class="nav-tabs" role="navigation" aria-label="Main navigation">
      <button class="nav-btn active" data-mode="home" aria-label="Home" aria-current="page">
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-mode="coloring" aria-label="Coloring">
        <span class="nav-icon" aria-hidden="true">🖍️</span>
        <span class="nav-label">Color</span>
      </button>
      <button class="nav-btn" data-mode="tracing" aria-label="Tracing">
        <span class="nav-icon" aria-hidden="true">✏️</span>
        <span class="nav-label">Trace</span>
      </button>
      <button class="nav-btn" data-mode="freedraw" aria-label="Free Drawing">
        <span class="nav-icon" aria-hidden="true">🖌️</span>
        <span class="nav-label">Draw</span>
      </button>
    </nav>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════ -->
  <main class="app-main" role="main">

    <!-- ──────────── HOME ──────────── -->
    <section id="mode-home" class="mode-section active" aria-label="Home screen">
      <div class="home-hero">
        <div class="home-title">
          <h1>🌈 Welcome to Kido Color!</h1>
          <p>Learn, draw, and have fun! 🌟</p>
        </div>
        <div class="home-cards" role="list">
          <button class="home-card card-color" data-mode="coloring" role="listitem" aria-label="Open Coloring mode">
            <div class="card-emoji" aria-hidden="true">🖍️</div>
            <div class="card-title">Color</div>
            <div class="card-subtitle">Paint the alphabet!</div>
          </button>
          <button class="home-card card-trace" data-mode="tracing" role="listitem" aria-label="Open Tracing mode">
            <div class="card-emoji" aria-hidden="true">✏️</div>
            <div class="card-title">Trace</div>
            <div class="card-subtitle">Learn to write!</div>
          </button>
          <button class="home-card card-draw" data-mode="freedraw" role="listitem" aria-label="Open Free Drawing mode">
            <div class="card-emoji" aria-hidden="true">🎨</div>
            <div class="card-title">Draw</div>
            <div class="card-subtitle">Create anything!</div>
          </button>
        </div>
      </div>
    </section>

    <!-- ──────────── COLORING ──────────── -->
    <section id="mode-coloring" class="mode-section" aria-label="Coloring mode" hidden>
      <div class="selector-bar">
        <!-- Style selector -->
        <div class="style-selector" id="colorStyleSelector" role="group" aria-label="Coloring theme">
          <button class="style-btn active" data-style="animals" aria-pressed="true">🦁 Animals</button>
          <button class="style-btn" data-style="objects" aria-pressed="false">🚗 Objects</button>
          <button class="style-btn" data-style="fruits" aria-pressed="false">🍎 Fruits</button>
        </div>
        <!-- A–Z letters -->
        <div class="letter-grid" id="colorLetterGrid" role="group" aria-label="Choose a letter"></div>
      </div>

      <div class="canvas-area">
        <div class="canvas-container" id="colorCanvasContainer">
          <canvas id="colorCanvas" aria-label="Coloring canvas"></canvas>
          <div class="tool-indicator" id="colorToolIndicator" aria-live="polite"></div>
        </div>
      </div>

      <div class="action-bar">
        <button class="action-btn btn-tools" id="colorToolsBtn" aria-label="Open tools panel">
          <span aria-hidden="true">🛠️</span> Tools
        </button>
        <button class="action-btn btn-undo" id="colorUndoBtn" aria-label="Undo last action">
          <span aria-hidden="true">↩️</span> Undo
        </button>
        <button class="action-btn btn-clear" id="colorClearBtn" aria-label="Clear canvas">
          <span aria-hidden="true">🗑️</span> Clear
        </button>
        <button class="action-btn btn-download" id="colorDownloadBtn" aria-label="Save artwork">
          <span aria-hidden="true">💾</span> Save
        </button>
      </div>
    </section>

    <!-- ──────────── TRACING ──────────── -->
    <section id="mode-tracing" class="mode-section" aria-label="Tracing mode" hidden>
      <div class="selector-bar">
        <!-- Tracing style selector -->
        <div class="style-selector" id="traceStyleSelector" role="group" aria-label="Tracing style">
          <button class="style-btn active" data-style="dotted" aria-pressed="true">⋯ Dotted</button>
          <button class="style-btn" data-style="arrows" aria-pressed="false">➡️ Arrows</button>
          <button class="style-btn" data-style="faint" aria-pressed="false">👻 Faint</button>
        </div>
        <!-- A–Z letters -->
        <div class="letter-grid" id="traceLetterGrid" role="group" aria-label="Choose a letter"></div>
      </div>

      <div class="canvas-area">
        <div class="canvas-container" id="traceCanvasContainer">
          <canvas id="traceCanvas" aria-label="Tracing canvas"></canvas>
          <div class="tool-indicator" id="traceToolIndicator" aria-live="polite"></div>
          <!-- Completion overlay -->
          <div class="completion-overlay" id="completionOverlay" hidden aria-live="assertive">
            <div class="completion-box">
              <div class="completion-stars">⭐⭐⭐</div>
              <div class="completion-text">Great job! 🎉</div>
              <button class="completion-btn" id="completionNextBtn">Next Letter ➡️</button>
            </div>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button class="action-btn btn-tools" id="traceToolsBtn" aria-label="Open tools panel">
          <span aria-hidden="true">🛠️</span> Tools
        </button>
        <button class="action-btn btn-undo" id="traceUndoBtn" aria-label="Undo">
          <span aria-hidden="true">↩️</span> Undo
        </button>
        <button class="action-btn btn-clear" id="traceClearBtn" aria-label="Clear tracing">
          <span aria-hidden="true">🗑️</span> Clear
        </button>
        <button class="action-btn btn-download" id="traceDownloadBtn" aria-label="Save artwork">
          <span aria-hidden="true">💾</span> Save
        </button>
      </div>
    </section>

    <!-- ──────────── FREE DRAW ──────────── -->
    <section id="mode-freedraw" class="mode-section" aria-label="Free drawing mode" hidden>
      <div class="canvas-area canvas-area-full">
        <div class="canvas-container" id="drawCanvasContainer">
          <canvas id="drawCanvas" aria-label="Free drawing canvas"></canvas>
          <div class="tool-indicator" id="drawToolIndicator" aria-live="polite"></div>
        </div>
      </div>

      <div class="action-bar">
        <button class="action-btn btn-tools" id="drawToolsBtn" aria-label="Open tools panel">
          <span aria-hidden="true">🛠️</span> Tools
        </button>
        <button class="action-btn btn-undo" id="drawUndoBtn" aria-label="Undo">
          <span aria-hidden="true">↩️</span> Undo
        </button>
        <button class="action-btn btn-clear" id="drawClearBtn" aria-label="Clear canvas">
          <span aria-hidden="true">🗑️</span> Clear
        </button>
        <button class="action-btn btn-download" id="drawDownloadBtn" aria-label="Save artwork">
          <span aria-hidden="true">💾</span> Save
        </button>
      </div>
    </section>

  </main><!-- /.app-main -->

  <!-- ═══════════════════════════════════════════
       TOOL PANEL (right-side slide-in drawer)
  ═══════════════════════════════════════════ -->
  <aside id="toolPanel" class="tool-panel" aria-label="Drawing tools panel" aria-hidden="true">
    <button class="panel-close" id="panelCloseBtn" aria-label="Close tools panel">✕</button>

    <!-- Tools -->
    <div class="panel-section">
      <h2 class="panel-title">🛠️ Tools</h2>
      <div class="tool-grid" role="group" aria-label="Drawing tools">
        <button class="tool-btn active" data-tool="pencil"      aria-pressed="true"  aria-label="Pencil">
          <span class="tool-icon" aria-hidden="true">✏️</span>
          <span class="tool-name">Pencil</span>
        </button>
        <button class="tool-btn" data-tool="sketchpen"  aria-pressed="false" aria-label="Sketch Pen">
          <span class="tool-icon" aria-hidden="true">🖊️</span>
          <span class="tool-name">Sketch</span>
        </button>
        <button class="tool-btn" data-tool="crayon"     aria-pressed="false" aria-label="Crayon">
          <span class="tool-icon" aria-hidden="true">🖍️</span>
          <span class="tool-name">Crayon</span>
        </button>
        <button class="tool-btn" data-tool="watercolor" aria-pressed="false" aria-label="Watercolor">
          <span class="tool-icon" aria-hidden="true">💧</span>
          <span class="tool-name">Water</span>
        </button>
        <button class="tool-btn" data-tool="postercolor" aria-pressed="false" aria-label="Poster Color">
          <span class="tool-icon" aria-hidden="true">🎨</span>
          <span class="tool-name">Poster</span>
        </button>
        <button class="tool-btn" data-tool="oilpaint"  aria-pressed="false" aria-label="Oil Paint">
          <span class="tool-icon" aria-hidden="true">🖌️</span>
          <span class="tool-name">Oil</span>
        </button>
        <button class="tool-btn" data-tool="bucket"    aria-pressed="false" aria-label="Bucket Fill">
          <span class="tool-icon" aria-hidden="true">🪣</span>
          <span class="tool-name">Fill</span>
        </button>
        <button class="tool-btn" data-tool="eraser"    aria-pressed="false" aria-label="Eraser">
          <span class="tool-icon" aria-hidden="true">🧹</span>
          <span class="tool-name">Erase</span>
        </button>
      </div>
    </div>

    <!-- Brush Size -->
    <div class="panel-section">
      <h2 class="panel-title">📏 Brush Size</h2>
      <div class="size-options" role="group" aria-label="Brush size">
        <button class="size-btn" data-size="3"  aria-pressed="false" aria-label="Small brush">S</button>
        <button class="size-btn active" data-size="8"  aria-pressed="true"  aria-label="Medium brush">M</button>
        <button class="size-btn" data-size="16" aria-pressed="false" aria-label="Large brush">L</button>
        <button class="size-btn" data-size="28" aria-pressed="false" aria-label="Extra large brush">XL</button>
      </div>
    </div>

    <!-- Color Palette -->
    <div class="panel-section">
      <h2 class="panel-title">🎨 Colors</h2>
      <div class="color-palette" id="colorPalette" role="group" aria-label="Color palette"></div>
      <div class="custom-color-row">
        <label for="customColorPicker" class="custom-color-label">Custom:</label>
        <input type="color" id="customColorPicker" value="#FF0000" aria-label="Pick a custom color" />
      </div>
    </div>
  </aside>

  <!-- Backdrop for tool panel -->
  <div id="panelOverlay" class="panel-overlay" aria-hidden="true"></div>

  <!-- Confetti layer -->
  <div id="confettiContainer" class="confetti-container" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       SCRIPTS (order matters — drawing first)
  ═══════════════════════════════════════════ -->
  <script src="scripts/drawing.js"></script>
  <script src="scripts/coloring.js"></script>
  <script src="scripts/tracing.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
